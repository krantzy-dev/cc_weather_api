name: ci

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .